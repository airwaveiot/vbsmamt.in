<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>छायाचित्रे</title>

<style>

body{
    margin:0;
    font-family:Nirmala UI, sans-serif;
    background:#f4f6fb;
    overflow-x:hidden;   /* prevents accidental scroll */
}

.section {
    text-align:center;
    padding:40px 0 20px;
}

.section h3 {
    font-size:28px;   /* increased size */
    font-weight:800;
    color:#003366;
    margin-bottom:10px;
    border-bottom:4px solid #ffcc00;
    display:inline-block;
    padding-bottom:6px;
}

h1{
    text-align:center;
    padding:40px 0 20px;
    color:#1a237e;
}

.gallery-container{
    max-width:1200px;
    margin:0 auto;
    padding:20px;
    column-count:2;
    column-gap:25px;
}

.gallery-container img{
    width:100%;
    height:auto;
    margin-bottom:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s ease;
    break-inside:avoid;
}

.gallery-container img:hover{
    transform:scale(1.05);
}

.back-btn{
    display:block;
    width:200px;
    margin:40px auto;
    text-align:center;
    padding:12px;
    background:#1a237e;
    color:#fff;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}

.top-btn{
    margin:20px auto 20px;
}

.page-section{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:20px 0 0px 0;
}



/* ================= MOBILE RESPONSIVE ================= */

@media (max-width:768px){

    /* Title */
	
    .page-section{
        margin:30px 0 10px 0;
    }

    	
	

    /* Buttons */
    .back-btn{
        width:180px;
        font-size:14px;
        padding:10px;
        margin:20px auto;
    }

    .top-btn{
        margin-top:10px;
        margin-bottom:15px;
    }

    /* Gallery layout → 1 column */
    .gallery-container{
        column-count:1;
        padding:15px;
        column-gap:15px;
    }

    .gallery-container img{
        margin-bottom:20px;
        border-radius:12px;
    }

}

/* FOOTER */

/* ================= FOOTER PREMIUM ================= */

.footer {
  width: 100%;
  background: linear-gradient(135deg,#F09B59,#003366);
  color:#fff;
  padding:20px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.footer::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle,rgba(255,255,255,0.1) 10%,transparent 60%);
    top:-50%;
    left:-50%;
    animation:shine 6s linear infinite;
}

@keyframes shine{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.footer-content{
    position:relative;
    z-index:2;
}

.developer{
    font-size:18px;
    font-weight:600;
    margin-bottom:8px;
    letter-spacing:0.5px;
}

.brand{
    color:#ffcc00;
    font-weight:800;
    font-size:20px;
}

.copyright{
    font-size:16px;
    opacity:0.9;
}

.domain{
    color:#00e5ff;
    font-weight:700;
}

</style>

</head>
<body>

<div class="section">
    <h3>छायाचित्रे (Gallery)</h3>
</div>


<a href="index.html" class="back-btn top-btn">मुख्य पानावर जा</a>

<div class="gallery-container" id="gallery"></div>

<a href="index.html" class="back-btn">मुख्य पानावर जा</a>

<footer class="footer">
  <div class="footer-content">
    <p class="developer">
      Designed & Developed by 
      <span class="brand">AirwaveIOT, Amravati (9423418365)</span>
    </p>

    <p class="copyright">
      Copyright © 2026 
      <span class="domain">www.vbsmamt.in</span> 
      | All Rights Reserved
    </p>
  </div>
</footer>

<script>
const gallery = document.getElementById("gallery");

// List ALL image filenames from your images folder
const images = [
  "1.jpeg",
  "2.jpeg",
  "3.jpeg",
  "4.jpeg",
  "5.jpeg",
  "6.jpeg",
  "8.jpeg",
  "9.jpeg",
  "10.jpeg",
  "11.jpeg",
  "12.jpeg",
  "13.jpeg",
  "14.jpeg",
  "15.jpeg",
  "16.jpeg",
  "17.jpg",
  "18.jpeg",
  "19.jpeg",
  "20.jpeg",
  "21.jpeg",
  "22.jpeg",
  "23.jpg",
  "24.jpg",
  "25.jpg",
  "26.jpeg",
  "27.jpeg",
  "28.jpeg",
  "29.jpeg",
  "30.jpeg",
  "31.jpeg",
  "32.jpg",
    // Add more here if present
];

images.forEach(img => {
    const imageElement = document.createElement("img");
    imageElement.src = "images/" + img;
    gallery.appendChild(imageElement);
});


</script>

<script>
history.scrollRestoration = "manual";
window.onload = function(){
    window.scrollTo(0,0);
};
</script>

</body>
</html>
